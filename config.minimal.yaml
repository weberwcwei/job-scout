# job-scout — minimal config
# Fill in the REQUIRED fields, then run: job-scout check
# For all options, see config.template.yaml or run: job-scout init --full

profile:
  name: ""              # REQUIRED — your name (used in email alerts)
  target_title: ""      # REQUIRED — e.g. "Senior Software Engineer"

search:
  terms:                # REQUIRED — at least one search term
    - ""                # e.g. "software engineer"
  locations:            # REQUIRED — at least one location
    - ""                # e.g. "San Francisco, CA"

# Optional: uncomment to enable email alerts (requires Gmail App Password)
# See README.md for setup instructions.
